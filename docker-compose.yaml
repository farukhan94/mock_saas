services:
  app:
    image: php:8.3-fpm
    container_name: saas_app
    user: root
    command: sh -c "php scripts/init_db.php && php-fpm"
    volumes:
      - .:/var/www/html
    working_dir: /var/www/html
    environment:
      - APP_ENV=local
      - DB_PATH=/var/www/html/database/database.sqlite
    networks:
      - saas-network

  web:
    image: nginx:latest
    container_name: saas_web
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - saas-network

networks:
  saas-network:
    driver: bridge
